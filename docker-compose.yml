services:
  atlas:
    build: .
    image: atlas:local
    container_name: atlas
    ports:
      - "8765:8765"
    environment:
      # Mount and use the SAME physical path inside the container as on the
      # host (~/.atlas). Same namespace means the AI runner on the host can
      # read PDF paths the container generates without translation.
      ATLAS_DATA_DIR: ${HOME}/.atlas
      # Route AI calls through the host runner (spawned by `atlas start`).
      # host.docker.internal resolves to the Mac host's loopback interface.
      ATLAS_AI_PROXY: http://host.docker.internal:8766
    # Shared secret for the runner's bearer auth. Generated by `atlas start`
    # into ~/.atlas/runner.env; run `atlas start` once on the host before
    # `docker compose up`.
    env_file:
      - ${HOME}/.atlas/runner.env
    volumes:
      - ${HOME}/.atlas:${HOME}/.atlas
    restart: unless-stopped
