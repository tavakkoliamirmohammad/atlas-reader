services:
  atlas:
    build: .
    image: atlas:local
    container_name: atlas
    ports:
      # Only the host-side port is user-overridable. The container's internal
      # port stays 8765 — it's isolated inside the container's network
      # namespace and can never collide with anything else on the host.
      - "${ATLAS_PORT:-8765}:8765"
    environment:
      # Mount and use the SAME physical path inside the container as on the
      # host (~/.atlas). Same namespace means the AI runner on the host can
      # read PDF paths the container generates without translation.
      ATLAS_DATA_DIR: ${HOME}/.atlas
      # Route AI calls through the host runner (spawned by `atlas start-runner`).
      # On Docker Desktop (Mac/Windows) host.docker.internal auto-resolves to
      # the host. On native Linux Docker it doesn't — the `extra_hosts` entry
      # below maps it to the bridge gateway. Same name, both platforms.
      ATLAS_AI_PROXY: http://host.docker.internal:${ATLAS_RUNNER_PORT:-8766}
      # Reach the local TTS sidecar over the compose network. No host
      # port is exposed; only sibling containers can talk to it.
      ATLAS_TTS_URL: http://tts:8767
    # Shared secret for the runner's bearer auth. Generated by `atlas up`
    # into ~/.atlas/runner.env; port overrides written by `atlas up --port ...`
    # also land in this file, so docker-compose sees them automatically.
    env_file:
      - ${HOME}/.atlas/runner.env
    volumes:
      - ${HOME}/.atlas:${HOME}/.atlas
    # No-op on Docker Desktop (host.docker.internal already resolves there);
    # required on native Linux Docker so the container can reach the host runner.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      tts:
        condition: service_healthy

  tts:
    build: ./services/tts
    image: atlas-tts:local
    container_name: atlas-tts
    # No `ports:` — internal-only. Reached by sibling containers as `tts:8767`.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx,sys; sys.exit(0 if httpx.get('http://127.0.0.1:8767/health', timeout=3).status_code==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
