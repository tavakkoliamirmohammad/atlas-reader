services:
  atlas:
    build: .
    image: atlas:local
    container_name: atlas
    ports:
      # Only the host-side port is user-overridable. The container's internal
      # port stays 8765 — it's isolated inside the container's network
      # namespace and can never collide with anything else on the host.
      - "${ATLAS_PORT:-8765}:8765"
    environment:
      # Mount and use the SAME physical path inside the container as on the
      # host (~/.atlas). Same namespace means the AI runner on the host can
      # read PDF paths the container generates without translation.
      ATLAS_DATA_DIR: ${HOME}/.atlas
      # Route AI calls through the host runner (spawned by `atlas start-runner`).
      # host.docker.internal resolves to the Mac host's loopback interface.
      ATLAS_AI_PROXY: http://host.docker.internal:${ATLAS_RUNNER_PORT:-8766}
    # Shared secret for the runner's bearer auth. Generated by `atlas up`
    # into ~/.atlas/runner.env; port overrides written by `atlas up --port ...`
    # also land in this file, so docker-compose sees them automatically.
    env_file:
      - ${HOME}/.atlas/runner.env
    volumes:
      - ${HOME}/.atlas:${HOME}/.atlas
      # Read-only single-file mount: the codex CLI maintains this cache on the
      # host and Atlas reads it to populate the model picker. Single file (not
      # the whole ~/.codex/) so we never expose codex auth or session state.
      - ${HOME}/.codex/models_cache.json:${HOME}/.codex/models_cache.json:ro
    restart: unless-stopped
